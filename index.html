<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>W2 Quiz & Games</title>
    <style>
        :root {
            --primary: #22d3ee;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 800px; }
        h1 { color: var(--primary); font-size: clamp(1.5rem, 5vw, 2.5rem); }
        p { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; }

        /* Container do Jogo Responsivo */
        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            background: #000;
            border: 3px solid var(--card);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(34, 211, 238, 0.2);
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; display: block; }

        #score-board {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 20px;
            color: var(--primary);
            font-weight: bold;
            font-family: monospace;
            z-index: 10;
        }

        /* Controles Mobile (D-Pad) */
        .controls {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            width: 60px;
            height: 60px;
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }

        .btn:active { background: var(--primary); color: var(--bg); transform: scale(0.95); }

        .up { grid-area: up; }
        .down { grid-area: down; }
        .left { grid-area: left; }
        .right { grid-area: right; }

        footer { margin-top: auto; padding: 30px; font-size: 0.8rem; color: #475569; text-align: center; }
        footer a { color: var(--primary); text-decoration: none; margin: 0 10px; }

        @media (min-width: 1024px) {
            .controls { display: none; } /* Esconde botões no PC/TV */
            header p::after { content: " | Use as setas ou WASD para jogar."; }
        }
    </style>
</head>
<body>

    <header>
        <h1>W2 Quiz & Games</h1>
        <p>Desafio da Cobrinha: Aqueça para o Quiz!</p>
    </header>

    <div id="game-wrapper">
        <div id="score-board">Score: 0</div>
        <canvas id="snakeGame" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <div class="btn up" onclick="setDir('UP')">▲</div>
        <div class="btn left" onclick="setDir('LEFT')">◀</div>
        <div class="btn down" onclick="setDir('DOWN')">▼</div>
        <div class="btn right" onclick="setDir('RIGHT')">▶</div>
    </div>

    <footer>
        <p>&copy; 2026 W2 Oficial. <a href="#">Terms of Service</a> | <a href="#">Privacy Policy</a></p>
    </footer>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreBoard = document.getElementById("score-board");

        const box = 20;
        let score = 0;
        let gameSpeed = 120;
        let snake = [{x: 9 * box, y: 10 * box}];
        let food = spawnFood();
        let d = "RIGHT";

        // Controles de Teclado (PC/TV)
        document.addEventListener("keydown", (e) => {
            if((e.key == "ArrowLeft" || e.key == "a") && d != "RIGHT") d = "LEFT";
            else if((e.key == "ArrowUp" || e.key == "w") && d != "DOWN") d = "UP";
            else if((e.key == "ArrowRight" || e.key == "d") && d != "LEFT") d = "RIGHT";
            else if((e.key == "ArrowDown" || e.key == "s") && d != "UP") d = "DOWN";
        });

        // Controles Mobile
        function setDir(dir) {
            if(dir == "LEFT" && d != "RIGHT") d = "LEFT";
            if(dir == "UP" && d != "DOWN") d = "UP";
            if(dir == "RIGHT" && d != "LEFT") d = "RIGHT";
            if(dir == "DOWN" && d != "UP") d = "DOWN";
        }

        function spawnFood() {
            return {
                x: Math.floor(Math.random() * 19 + 0.5) * box,
                y: Math.floor(Math.random() * 19 + 0.5) * box
            };
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenha Cobrinha
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#22d3ee" : "#164e63";
                ctx.fillRect(part.x, part.y, box-1, box-1);
            });

            // Desenha Comida
            ctx.fillStyle = "#ef4444";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2.5, 0, Math.PI * 2);
            ctx.fill();

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if(d == "LEFT") snakeX -= box;
            if(d == "UP") snakeY -= box;
            if(d == "RIGHT") snakeX += box;
            if(d == "DOWN") snakeY += box;

            // Colisão com Comida
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreBoard.innerText = "Score: " + score;
                food = spawnFood();
            } else {
                snake.pop();
            }

            let newHead = {x: snakeX, y: snakeY};

            // Fim de Jogo (Paredes ou Próprio corpo)
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("Game Over! Score: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            return array.some(part => head.x === part.x && head.y === part.y);
        }

        let game = setInterval(draw, gameSpeed);
    </script>
</body>
</html>
